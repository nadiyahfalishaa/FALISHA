<!DOCTYPE html>
<html>
<head>
    <title>FALISHA</title>

    <style>
       * {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
         font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #aafab6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background-color: beige;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.205);
            text-align: center;
        }
        h1 {
            color:#13441a;
            margin-bottom: 20px;
        }

        button {
            background-color: #3ead4f;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #4aed62;
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>BIODATA</h1><h2>NADIYAH FALISHA ADRIANISANTOSA</h2>
        <p style="margin-bottom: 20px;">3 APRIL 2008</p>

        <form action="/klik" method="post">
            <button type="submit">CEK DETAIL ┈➤
</button>
        </form>
    </div>
</body>

</html>
